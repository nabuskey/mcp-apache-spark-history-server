name: release-cli

on:
  push:
    tags: ['cli/v[0-9]+.[0-9]+.[0-9]+*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: release
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: skills/cli/go.mod

      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli/}" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: skills/cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          go build -trimpath \
            -ldflags "-s -w -X github.com/kubeflow/mcp-apache-spark-history-server/skills/cli/cmd.cliVersion=${{ steps.version.outputs.version }}" \
            -o shs .

      - name: Archive
        working-directory: skills/cli
        run: tar czf "shs_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" shs

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: shs_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}
          path: skills/cli/shs_${{ steps.version.outputs.version }}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Parse version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli/}" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: shs_${{ steps.version.outputs.version }}_*
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum shs_*.tar.gz > checksums_sha256.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "SHS CLI ${{ steps.version.outputs.version }}" \
            --generate-notes \
            shs_*.tar.gz checksums_sha256.txt
